name: Build and Release VS Code Extension

on:
  pull_request:
    branches: [main, master]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # e.g. v0.1.1 → creates GitHub Release
    branches: [DEV-master, main, master]  # compile + artifact on every push
  workflow_dispatch:                   # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension and web bundle
        run: npm run check

      - name: Package VS Code extension (.vsix)
        run: npm run package:vsix

      - name: Package MATLAB toolbox (.mltbx)
        shell: bash
        run: |
          PKG="seqeyes-toolbox"
          mkdir -p "$PKG/web"
          # MATLAB source files (flat at root)
          cp matlab/seqeyes.m matlab/openseq.m matlab/gettingStarted.m matlab/toolboxInfo.xml "$PKG/"
          cp -r matlab/examples "$PKG/"
          cp -r matlab/resources "$PKG/"
          # Web assets
          cp web/index.html web/pulseq-bundle.js web/logo.png web/logo.svg "$PKG/web/"
          # License
          cp LICENSE.txt "$PKG/"
          # Read version from toolbox metadata
          VER=$(grep -oP '<version>\K[^<]+' matlab/toolboxInfo.xml)
          OUTFILE="seqeyes-${VER}.mltbx"
          (cd "$PKG" && zip -r "../${OUTFILE}" .)
          echo "mltbx=$(pwd)/${OUTFILE}" >> $GITHUB_ENV
          echo "mltbx_name=${OUTFILE}" >> $GITHUB_ENV

      - name: Upload MATLAB toolbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-mltbx
          path: seqeyes-*.mltbx

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-web-vsix
          path: seqeyes-web.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Installation

            **VS Code:** Download `seqeyes-web.vsix` below and install via:
            ```
            code --install-extension seqeyes-web.vsix
            ```
            Or drag & drop into VS Code's Extensions panel.

            **MATLAB:** Download `seqeyes-*.mltbx` below and double-click in MATLAB, or run:
            ```matlab
            matlab.addons.toolbox.installToolbox('seqeyes-*.mltbx')
            ```
            Requires MATLAB R2022a or later.

            ## Changes

            See [commits since last release](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}).
          files: |
            seqeyes-web.vsix
            seqeyes-*.mltbx
          generate_release_notes: true
