name: Build and Release VS Code Extension

on:
  pull_request:
    branches: [main, master]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # e.g. v0.1.1 → creates GitHub Release
    branches: [DEV-master, main, master]  # compile + artifact on every push
  workflow_dispatch:                   # manual trigger from Actions tab

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension and web bundle
        run: npm run check

      - name: Package VS Code extension (.vsix)
        run: npm run package:vsix

      - name: Package MATLAB toolbox (.mltbx)
        # Requires MATLAB — build locally with:  run('matlab/pack_toolbox.m')
        # Then upload with:  gh release upload v0.1.7 seqeyes-0.1.7.mltbx
        run: echo "Skipping .mltbx — build locally with pack_toolbox.m"

      - name: Upload MATLAB toolbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-mltbx
          path: seqeyes-*.mltbx

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-web-vsix
          path: seqeyes-web.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Installation

            **VS Code:** Download `seqeyes-web.vsix` below and install via:
            ```
            code --install-extension seqeyes-web.vsix
            ```
            Or drag & drop into VS Code's Extensions panel.

            **MATLAB:** Build and install locally:
            ```matlab
            run('matlab/pack_toolbox.m')
            ```
            Requires MATLAB R2022a+. See [DEPLOY.md](matlab/DEPLOY.md) for details.

            **Python:** Install from PyPI:
            ```bash
            pip install seqeyes-python
            ```

            ## Changes

            See [commits since last release](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}).
          files: |
            seqeyes-web.vsix
            seqeyes-*.mltbx
            python/dist/*
          generate_release_notes: true

  python-build:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: cd python && python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-python-dist
          path: python/dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: python-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: seqeyes-python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
