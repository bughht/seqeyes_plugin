name: Release VS Code Extension

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # e.g. v0.1.1 → creates GitHub Release
    branches: [DEV-master, main, master]  # compile + artifact on every push
  workflow_dispatch:                   # manual trigger from Actions tab

permissions:
  contents: write                      # needed for creating releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --out seqeyes-plugin.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-plugin-vsix
          path: seqeyes-plugin.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Installation

            Download `seqeyes-plugin.vsix` below and install via:
            ```
            code --install-extension seqeyes-plugin.vsix
            ```
            Or drag & drop into VS Code's Extensions panel.

            ## Changes

            See [commits since last release](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}).
          files: seqeyes-plugin.vsix
          generate_release_notes: true
