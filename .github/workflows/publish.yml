name: Build and Release VS Code Extension

on:
  pull_request:
    branches: [main, master]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # e.g. v0.1.1 → creates GitHub Release
    branches: [DEV-master, main, master]  # compile + artifact on every push
  workflow_dispatch:                   # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension and web bundle
        run: npm run check

      - name: Package extension
        run: npx @vscode/vsce package --out seqeyes-web.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqeyes-web-vsix
          path: seqeyes-web.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Installation

            Download `seqeyes-web.vsix` below and install via:
            ```
            code --install-extension seqeyes-web.vsix
            ```
            Or drag & drop into VS Code's Extensions panel.

            ## Changes

            See [commits since last release](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}).
          files: seqeyes-web.vsix
          generate_release_notes: true
