name: Performance Guards

on:
  workflow_dispatch:
  push:
    branches: [main, master, 'feature/**', 'fix/**']
  schedule:
    - cron: '20 8 * * 1'

jobs:
  node-performance:
    name: Node Performance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Node performance guard
        run: npm run perf:node

      - name: Upload Node performance artifact
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: performance-node
          path: performance-results/performance-node.json
          retention-days: 30

  browser-performance:
    name: Browser Performance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser performance guard
        run: npm run perf:browser

      - name: Upload browser performance artifact
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: performance-browser
          path: performance-results/performance-browser.json
          retention-days: 30

      - name: Upload Playwright performance report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-performance-report
          path: playwright-report/performance/
          retention-days: 14
