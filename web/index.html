<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SeqEyes — Pulseq MRI Sequence Viewer</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   CSS — identical to VS Code webview (css.ts)
   ═══════════════════════════════════════════════════════════════ */
:root{--bg:#fff;--fg:#222;--gr:#ddd;--rf:#e6194b;--rff:rgba(230,25,75,.07);--gx:#3cb44b;--gy:#4363d8;--gz:#f58231;--adc:#42d4f4;--adf:rgba(66,212,244,.14);--tr:#911eb4;--ax:#aaa;--lb:#888;--cr:#ee0000;--bd:#ddd;--trbg:#f8f8f8}
body.theme-onelight{--bg:#fafafa;--fg:#383a42;--gr:#e5e5e6;--rf:#e45649;--rff:rgba(228,86,73,.08);--gx:#50a14f;--gy:#4078f2;--gz:#c18401;--adc:#0184bc;--adf:rgba(1,132,188,.12);--tr:#a626a4;--ax:#a0a1a7;--lb:#696c77;--cr:#e45649;--bd:#e5e5e6;--trbg:#f5f5f5}
body.theme-onedark{--bg:#282c34;--fg:#abb2bf;--gr:#3e4452;--rf:#e06c75;--rff:rgba(224,108,117,.10);--gx:#98c379;--gy:#61afef;--gz:#e5c07b;--adc:#56b6c2;--adf:rgba(86,182,194,.14);--tr:#c678dd;--ax:#5c6370;--lb:#828997;--cr:#e06c75;--bd:#3e4452;--trbg:#2c313a}
body.theme-dracula{--bg:#282a36;--fg:#f8f8f2;--gr:#44475a;--rf:#ff5555;--rff:rgba(255,85,85,.10);--gx:#50fa7b;--gy:#8be9fd;--gz:#ffb86c;--adc:#8be9fd;--adf:rgba(139,233,253,.14);--tr:#bd93f9;--ax:#6272a4;--lb:#8890b8;--cr:#ff5555;--bd:#44475a;--trbg:#2e3040}
body.theme-nord{--bg:#2e3440;--fg:#eceff4;--gr:#434c5e;--rf:#bf616a;--rff:rgba(191,97,106,.10);--gx:#a3be8c;--gy:#81a1c1;--gz:#d08770;--adc:#88c0d0;--adf:rgba(136,192,208,.14);--tr:#b48ead;--ax:#4c566a;--lb:#7b8898;--cr:#bf616a;--bd:#434c5e;--trbg:#353b49}
body.theme-githublight{--bg:#ffffff;--fg:#24292f;--gr:#d0d7de;--rf:#cf222e;--rff:rgba(207,34,46,.07);--gx:#1a7f37;--gy:#0969da;--gz:#bc4c00;--adc:#0969da;--adf:rgba(9,105,218,.10);--tr:#8250df;--ax:#afb8c1;--lb:#656d76;--cr:#cf222e;--bd:#d0d7de;--trbg:#f6f8fa}
body.theme-github{--bg:#0d1117;--fg:#c9d1d9;--gr:#21262d;--rf:#ff7b72;--rff:rgba(255,123,114,.08);--gx:#7ee787;--gy:#79c0ff;--gz:#ffa657;--adc:#a5d6ff;--adf:rgba(165,214,255,.12);--tr:#d2a8ff;--ax:#30363d;--lb:#8b949e;--cr:#ff7b72;--bd:#21262d;--trbg:#161b22}
*{margin:0;padding:0;box-sizing:border-box}
body{font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;user-select:none;display:flex;flex-direction:column}
#main{display:flex;flex:1;overflow:hidden}
#left{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
#right{width:0;overflow:hidden;position:relative;border-left:1px solid var(--gr);transition:width .25s}
#right.open{width:500px}
#right .handle{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:20}
#right .handle:hover{background:var(--adc);opacity:.3}
#right canvas{position:absolute;top:0;left:0;display:block;width:100%;height:100%}
#kg{z-index:0;pointer-events:none}
#kc{z-index:1;pointer-events:auto;background:transparent}
#rc{position:absolute;top:4px;left:4px;z-index:10;display:flex;flex-direction:column;gap:2px}
#rc button{background:var(--gr);border:1px solid var(--ax);color:var(--fg);padding:2px 6px;border-radius:3px;cursor:pointer;font-size:10px}
#rc button:hover{opacity:.75}
#tb{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg);border-bottom:1px solid var(--gr);font-size:11px;flex-shrink:0;flex-wrap:wrap}
#tb button{background:var(--gr);border:1px solid var(--ax);color:var(--fg);padding:2px 7px;border-radius:3px;cursor:pointer;font-size:11px}
#tb button:hover{opacity:.75}
#tb button:disabled{opacity:.45;cursor:not-allowed}
#tb select{background:var(--gr);border:1px solid var(--ax);color:var(--fg);padding:2px 4px;border-radius:3px;font-size:11px;cursor:pointer}
#tb .sep{width:1px;height:16px;background:var(--ax);margin:0 3px}
#tb .lg{display:flex;gap:7px;align-items:center;font-size:11px}
#tb .li{cursor:pointer;display:flex;align-items:center;gap:3px;padding:1px 4px;border-radius:3px;opacity:1;transition:opacity .15s}
#tb .li.off{opacity:.30}
#tb .ld{width:10px;height:10px;border-radius:2px;border:1px solid rgba(0,0,0,.15)}
#tb .cur{font:11px monospace;color:var(--cr);margin-left:auto;min-width:300px;text-align:right;white-space:nowrap}
#tb .ulbl{font-size:10px;color:var(--lb);margin:0 1px}
#cc{flex:1;overflow:hidden;position:relative;cursor:crosshair}
#cc.pan{cursor:grabbing}
canvas{display:block}
#tt{position:absolute;pointer-events:none;background:rgba(0,0,0,.88);color:#fff;padding:5px 9px;border-radius:4px;font:11px monospace;white-space:pre;display:none;z-index:100;line-height:1.35;max-width:340px}
/* Splash screen */
#splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200;flex-direction:column;gap:16px}
#splash h1{font-size:28px;color:var(--fg);letter-spacing:1px}
#splash p{color:var(--lb);font-size:14px}
#splash button{padding:10px 24px;background:var(--adc);color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;transition:opacity .2s}
#splash button:hover{opacity:.85}
#splash .drop{width:300px;height:100px;border:2px dashed var(--gr);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--lb);transition:border-color .2s,background .2s}
#splash .drop.dragover{border-color:var(--adc);background:var(--adf)}
/* Minimap */
#mmap{height:22px;border-bottom:1px solid var(--gr);background:var(--trbg);flex-shrink:0;cursor:pointer;position:relative}
#mmap canvas{display:block;width:100%;height:100%}
/* Progress overlay */
#poverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
#pcard{background:var(--bg);border:1px solid var(--gr);border-radius:10px;padding:24px 32px;min-width:280px;max-width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}
#pspinner{width:32px;height:32px;border:3px solid var(--gr);border-top-color:var(--adc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#ptext{font-size:12px;color:var(--fg);margin-bottom:10px;line-height:1.4}
#pbar2{height:5px;background:var(--gr);border-radius:3px;overflow:hidden;margin:0 0 6px}
#pfill2{height:100%;width:0%;background:var(--adc);border-radius:3px;transition:width .4s ease}
#ppct{font-size:11px;color:var(--lb);font-family:monospace}
</style>
</head>
<body>

<!-- Splash screen (shown until a file is loaded) -->
<div id="splash">
  <img src="logo.svg" alt="SeqEyes-Online" style="width:200px;height:200px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.15)">
  <h1>SeqEyes</h1>
  <p>Pulseq MRI Sequence Viewer</p>
  <button id="splashOpen">Open .seq File</button>
  <div class="drop" id="dropZone">Or drag &amp; drop a <code>.seq</code> file here</div>
  <p style="font-size:11px;color:var(--lb);margin-top:8px">
    Try with example files from <a href="https://github.com/pulseq/pulseq" target="_blank" style="color:var(--adc)">pulseq/pulseq</a>
  </p>
</div>
<input type="file" id="fileInput" accept=".seq" style="display:none">

<!-- ═══════════════════════════════════════════════════════════════
     HTML Body — same as VS Code webview (html.ts)
     ═══════════════════════════════════════════════════════════════ -->
<div id="tb">
<img src="logo.png" alt="SeqEyes" style="width:18px;height:18px;border-radius:3px;vertical-align:middle" title="SeqEyes">
<button id="openBtn" title="Open another .seq file">Open</button>
<button id="exportKspaceBtn" title="Export ADC k-space trajectory and metadata" disabled>Export</button><div class="sep"></div>
<button id="zi" title="Zoom In (scroll wheel)">+</button>
<button id="zo" title="Zoom Out">−</button>
<button id="zf" title="Fit All">Fit</button>
<button id="zr" title="Reset">↺</button><div class="sep"></div>
<span class="ulbl">Theme:</span><select id="theme"><option value="system">System</option><option value="onelight">One Light</option><option value="onedark">One Dark</option><option value="dracula">Dracula</option><option value="nord">Nord</option><option value="githublight">GitHub Light</option><option value="github">GitHub</option></select>
<div class="sep"></div>
<span class="ulbl">Time:</span><select id="tu"><option value="s">s</option><option value="ms" selected>ms</option><option value="us">µs</option></select>
<span class="ulbl">Grad:</span><select id="gu"><option value="Hz/m" selected>Hz/m</option><option value="mT/m">mT/m</option><option value="G/cm">G/cm</option></select>
<div class="sep"></div>
<label class="li" id="bbt" title="Toggle block boundary lines"><input type="checkbox" id="bbc" style="margin:0;cursor:pointer"><span style="font-size:11px;color:var(--fg)">Blocks</span></label>
<div class="sep"></div><div class="lg" id="legend"></div>
<button id="kbtn" title="Toggle K-Space View" style="margin-left:4px">K-Space</button>
<span class="cur" id="cur">← hover for time</span>
</div>
<!-- Progress overlay -->
<div id="poverlay" style="display:none"><div id="pcard"><div id="pspinner"></div><div id="ptext">Loading sequence…</div><div id="pbar2"><div id="pfill2"></div></div><div id="ppct">0%</div></div></div>
<!-- Minimap -->
<div id="mmap"><canvas id="mmc"></canvas></div>
<div id="main">
<div id="left"><div id="cc"><canvas id="mc"></canvas><div id="tt"></div></div></div>
<div id="right"><div class="handle" id="khandle"></div><canvas id="kg"></canvas><canvas id="kc"></canvas><div id="rc"><button id="krst" title="Reset view">↺</button><button id="kax" title="Toggle projection">Prj</button><button id="kunit" title="Toggle k-space unit (1/m ↔ rad/m)">Unit: 1/m</button><div style="display:flex;align-items:center;gap:2px;margin-top:4px"><span style="font-size:9px;color:var(--lb)">Size</span><input type="range" id="kdot" min="1" max="12" value="2" style="width:50px;accent-color:var(--adc)" title="ADC marker size"></div></div></div>
</div>

<!-- Pulseq parser bundle (built by esbuild) -->
<script src="pulseq-bundle.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   SeqEyes — Standalone Web Application
   ═══════════════════════════════════════════════════════════════════════ */
(function(){
"use strict";

/* ── DOM refs ────────────────────────────────────────────────────────── */
var cc=document.getElementById('cc'),mc=document.getElementById('mc'),ctx=mc.getContext('2d'),
 tt=document.getElementById('tt'),curEl=document.getElementById('cur'),legend=document.getElementById('legend'),
 tuSel=document.getElementById('tu'),guSel=document.getElementById('gu');
var splash=document.getElementById('splash');
var exportBtn=document.getElementById('exportKspaceBtn');
var BL=[],TD=0,GR=1e-5,RR=1e-6,AR=1e-7,BR=1e-5;
var M={t:8,r:30,b:22,l:92};
var CH=['RF','\u03c6','Gx','Gy','Gz','ADC','Trig'];
var chColors=['var(--rf)','var(--rf)','var(--gx)','var(--gy)','var(--gz)','var(--adc)','var(--tr)'];
var chVis=[true,true,true,true,true,true,true];
var gMax=[1,6.28318,1,1,1,0,0];
var ox=0,sc=1;
var dr=false,dsx=0,dso=0;
var cursorT=0,cursorActive=false;
var timeUnit='ms',gradUnit='Hz/m';
var showBB=false;
var GAMMA=42576;
var ampZoom=[1,1,1,1,1,1,1];
var kTraj=null,kAdc=null,kTime=null,kAdcTime=null;
/* Timing & minimap state */
var seqTiming=null,blockPos=[];
var mmCanvas=document.getElementById('mmc'),mmCtx=mmCanvas.getContext('2d');
var mmCache=null,mmCacheW=0,mmCacheDpr=0,mmDrag=false;
var currentSequenceText='',currentSequenceName='',exportBusy=false;

/* ── Unit helpers ────────────────────────────────────────────────────── */
function gradConv(v){if(gradUnit==='mT/m')return v/GAMMA;if(gradUnit==='G/cm')return v/(GAMMA*10);return v;}
function gradUnitStr(){return gradUnit;}
function timeConv(t){if(timeUnit==='ms')return t*1e3;if(timeUnit==='us')return t*1e6;return t;}
function timeUnitStr(){return timeUnit;}
function setExportButtonEnabled(enabled){if(exportBtn)exportBtn.disabled=!enabled||exportBusy;}

/* ── Legend ──────────────────────────────────────────────────────────── */
function buildLegend(){
  legend.innerHTML='';
  chColors.forEach(function(c,i){
    var d=document.createElement('div');d.className='li'+(chVis[i]?'':' off');d.title='Toggle '+CH[i];
    d.innerHTML='<div class="ld" style="background:'+c+'"></div>'+CH[i];
    d.onclick=function(){chVis[i]=!chVis[i];buildLegend();computeGlobalMax();draw();};
    legend.appendChild(d);
  });
}
buildLegend();
tuSel.onchange=function(){timeUnit=tuSel.value;draw();};
guSel.onchange=function(){gradUnit=guSel.value;draw();};

/* ── Coordinate mapping ──────────────────────────────────────────────── */
function visChannels(){var v=[];for(var i=0;i<CH.length;i++)if(chVis[i])v.push(i);return v;}
function cy(vi){var vc=visChannels(),h=(mc.height/(window.devicePixelRatio||1)-M.t-M.b)/Math.max(vc.length,1);return M.t+vi*h+h/2;}
function cH(){var vc=visChannels();return(mc.height/(window.devicePixelRatio||1)-M.t-M.b)/Math.max(vc.length,1);}
function t2x(t){return M.l+(t-ox)*sc}
function x2t(x){return ox+(x-M.l)/sc}

/* ── Viewport bounds ───────────────────────────────────────────────────── */
function plotWidth(){var dpr=window.devicePixelRatio||1,w=mc.width/dpr;return Math.max(1,w-M.l-M.r);}
function minRasterTime(){var vals=[GR,RR,AR,BR].filter(function(v){return isFinite(v)&&v>0;});return vals.length?Math.min.apply(null,vals):1e-7;}
function visibleDuration(){return plotWidth()/Math.max(sc,1e-12);}
function clampView(){
  var pw=plotWidth();
  if(!isFinite(TD)||TD<=0){ox=0;sc=1;return;}
  if(!isFinite(sc)||sc<=0)sc=pw/TD;
  var minDur=Math.min(TD,minRasterTime()),dur=visibleDuration();
  if(!isFinite(dur)||dur<=0)dur=TD;
  dur=Math.max(minDur,Math.min(TD,dur));sc=pw/dur;
  var maxOx=Math.max(0,TD-dur);if(!isFinite(ox))ox=0;ox=Math.max(0,Math.min(ox,maxOx));
}
function zoomAt(screenX,zf){
  if(!isFinite(zf)||zf<=0)return;
  var tm=x2t(screenX);sc*=zf;
  var dur=visibleDuration();if(!isFinite(dur)||dur<=0)dur=TD||minRasterTime();
  var maxDur=TD||dur,minDur=Math.min(maxDur,minRasterTime());
  dur=Math.max(minDur,Math.min(maxDur,dur));sc=plotWidth()/dur;
  ox=tm-(screenX-M.l)/sc;clampView();
}
function zoomAtCenter(zf){zoomAt(M.l+plotWidth()/2,zf);}

/* ── Global amplitude ranges ──────────────────────────────────────────── */
function computeGlobalMax(){
  gMax=[0.001,6.28318,0.001,0.001,0.001,1,1,0.001,0.001];
  for(var i=0;i<BL.length;i++){var b=BL[i];
    if(b.rf){var a=Math.abs(b.rf.a||0);if(a>gMax[0])gMax[0]=a;}
    if(b.gx&&b.gx.ty!=='none'&&Math.abs(b.gx.a||0)>gMax[2])gMax[2]=Math.abs(b.gx.a);
    if(b.gy&&b.gy.ty!=='none'&&Math.abs(b.gy.a||0)>gMax[3])gMax[3]=Math.abs(b.gy.a);
    if(b.gz&&b.gz.ty!=='none'&&Math.abs(b.gz.a||0)>gMax[4])gMax[4]=Math.abs(b.gz.a);
  }
  gMax[0]=Math.max(gMax[0],100);
}

/* ── Canvas resize ────────────────────────────────────────────────────── */
function rs(){
  var dpr=window.devicePixelRatio||1,r=cc.getBoundingClientRect();
  mc.width=r.width*dpr;mc.height=r.height*dpr;
  mc.style.width=r.width+'px';mc.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  var mr=document.getElementById('mmap').getBoundingClientRect();
  mmCanvas.width=mr.width*dpr;mmCanvas.height=mr.height*dpr;
  mmCanvas.style.width=mr.width+'px';mmCanvas.style.height=mr.height+'px';
  mmCtx.setTransform(dpr,0,0,dpr,0,0);
  draw();drawMinimap();
}
window.addEventListener('resize',rs);new ResizeObserver(rs).observe(cc);

/* ── Minimap functions ───────────────────────────────────────────────── */
function fitToFirstTR(){
  if(!seqTiming||seqTiming.trTimeSec<=0){fit();return;}
  var w=mc.width/(window.devicePixelRatio||1);
  var trDur=seqTiming.trTimeSec;
  sc=(w-M.l-M.r)/(trDur*1.2);ox=Math.max(0,-trDur*0.1);
  clampView();
}

function parseHexRGB(c){
  if(!c||c[0]!=='#')return[128,128,128];
  var h=c.substring(1);if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  return[parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)];
}

function fillBand(d,W,x0,x1,y0,y1,r,g,b,a){
  for(var y=y0;y<y1;y++){for(var x=x0;x<x1;x++){
    var i=(y*W+x)*4,srcA=a/255,dstA=d[i+3]/255,outA=srcA+dstA*(1-srcA);
    if(outA<0.001)continue;
    d[i]=(r*srcA+d[i]*dstA*(1-srcA))/outA;
    d[i+1]=(g*srcA+d[i+1]*dstA*(1-srcA))/outA;
    d[i+2]=(b*srcA+d[i+2]*dstA*(1-srcA))/outA;
    d[i+3]=Math.round(outA*255);
  }}
}

function buildMinimapCache(){
  mmCache=null;if(!TD||TD<=0||!BL.length)return;
  var dpr=window.devicePixelRatio||1,W=mmCanvas.width,H=mmCanvas.height;
  if(W<=0||H<=0)return;
  var s=getComputedStyle(document.body),cssW=W/dpr,scM=cssW/TD;
  var rfRGB=parseHexRGB(s.getPropertyValue('--rf').trim());
  var gxRGB=parseHexRGB(s.getPropertyValue('--gx').trim());
  var gyRGB=parseHexRGB(s.getPropertyValue('--gy').trim());
  var gzRGB=parseHexRGB(s.getPropertyValue('--gz').trim());
  var adcRGB=parseHexRGB(s.getPropertyValue('--adc').trim());
  var bgRGB=parseHexRGB(s.getPropertyValue('--trbg').trim());
  var rfY0=0,rfY1=5*dpr,gY0=5*dpr,gH=2*dpr,aY0=11*dpr,aY1=H;
  var pw=Math.max(1,Math.ceil(cssW));
  var rfCnt=new Uint8Array(pw),adcCnt=new Uint8Array(pw);
  var gxCnt=new Uint8Array(pw),gyCnt=new Uint8Array(pw),gzCnt=new Uint8Array(pw);
  var stride=BL.length>20000?Math.floor(BL.length/15000):1;
  for(var i=0;i<BL.length;i+=stride){
    var b=BL[i],px0=Math.floor(b.s*scM),px1=Math.ceil((b.s+b.d)*scM);
    if(px0>=pw)continue;px0=Math.max(0,px0);px1=Math.min(pw,px1);
    if(b.rf)for(var p=px0;p<px1;p++){if(rfCnt[p]<255)rfCnt[p]++;}
    if(b.gx&&b.gx.ty!=='none')for(var p=px0;p<px1;p++){if(gxCnt[p]<255)gxCnt[p]++;}
    if(b.gy&&b.gy.ty!=='none')for(var p=px0;p<px1;p++){if(gyCnt[p]<255)gyCnt[p]++;}
    if(b.gz&&b.gz.ty!=='none')for(var p=px0;p<px1;p++){if(gzCnt[p]<255)gzCnt[p]++;}
    if(b.adc)for(var p=px0;p<px1;p++){if(adcCnt[p]<255)adcCnt[p]++;}
  }
  var imgData=new ImageData(W,H),d=imgData.data;
  for(var y=0;y<H;y++){for(var x=0;x<W;x++){var idx=(y*W+x)*4;d[idx]=bgRGB[0];d[idx+1]=bgRGB[1];d[idx+2]=bgRGB[2];d[idx+3]=255;}}
  for(var px=0;px<pw;px++){
    var x0=Math.floor(px*dpr),x1=Math.floor((px+1)*dpr);if(x1<=x0)x1=x0+1;
    if(rfCnt[px]>0){var a=Math.min(140,rfCnt[px]*55);fillBand(d,W,x0,x1,rfY0,rfY1,rfRGB[0],rfRGB[1],rfRGB[2],a);}
    if(gxCnt[px]>0){var a=Math.min(150,gxCnt[px]*60);fillBand(d,W,x0,x1,gY0,gY0+gH,gxRGB[0],gxRGB[1],gxRGB[2],a);}
    if(gyCnt[px]>0){var a=Math.min(150,gyCnt[px]*60);fillBand(d,W,x0,x1,gY0+gH,gY0+2*gH,gyRGB[0],gyRGB[1],gyRGB[2],a);}
    if(gzCnt[px]>0){var a=Math.min(150,gzCnt[px]*60);fillBand(d,W,x0,x1,gY0+2*gH,gY0+3*gH,gzRGB[0],gzRGB[1],gzRGB[2],a);}
    if(adcCnt[px]>0){var a=Math.min(130,adcCnt[px]*50);fillBand(d,W,x0,x1,aY0,aY1,adcRGB[0],adcRGB[1],adcRGB[2],a);}
  }
  var oc=document.createElement('canvas');oc.width=W;oc.height=H;
  oc.getContext('2d').putImageData(imgData,0,0);
  mmCache=oc;mmCacheW=W;mmCacheDpr=dpr;
}

function drawMinimap(){
  var dpr=window.devicePixelRatio||1,W=mmCanvas.width/dpr,H=mmCanvas.height/dpr;
  mmCtx.globalAlpha=1;mmCtx.clearRect(0,0,W,H);if(!TD||TD<=0)return;
  var s=getComputedStyle(document.body);
  if(!mmCache||mmCacheW!==mmCanvas.width||mmCacheDpr!==dpr)buildMinimapCache();
  if(mmCache){mmCtx.drawImage(mmCache,0,0);}else{mmCtx.fillStyle=s.getPropertyValue('--trbg').trim();mmCtx.fillRect(0,0,W,H);}
  if(!BL.length)return;var scM=W/TD;
  if(seqTiming&&seqTiming.trTimeSec>0&&seqTiming.trCount>1){
    mmCtx.strokeStyle=s.getPropertyValue('--fg').trim();mmCtx.globalAlpha=0.10;mmCtx.lineWidth=0.4;mmCtx.beginPath();
    for(var tr=0;tr<=seqTiming.trCount;tr++){var tx=tr*seqTiming.trTimeSec*scM;if(tx<=W){mmCtx.moveTo(tx,0);mmCtx.lineTo(tx,H);}}
    mmCtx.stroke();mmCtx.globalAlpha=1;
  }
  var mcW=mc.width/dpr,vx0=ox*scM,vx1=(ox+(mcW-M.l-M.r)/sc)*scM;
  vx0=Math.max(0,vx0);vx1=Math.min(W,vx1);var vw=Math.max(2,vx1-vx0);
  mmCtx.fillStyle=s.getPropertyValue('--fg').trim();mmCtx.globalAlpha=0.18;mmCtx.fillRect(vx0,0,vw,H);
  mmCtx.globalAlpha=0.45;mmCtx.fillStyle=s.getPropertyValue('--adc').trim();
  if(vx0>0.5)mmCtx.fillRect(vx0,0,1,H);
  if(vx1<W-0.5)mmCtx.fillRect(vx1-1,0,1,H);
  mmCtx.globalAlpha=1;
  var info='';if(seqTiming){
    if(seqTiming.trTimeSec>0)info+='TR='+fmtDur2(seqTiming.trTimeSec)+(seqTiming.hasExplicitTR?'':'~')+'  ';
    if(seqTiming.teTimeSec>0)info+='TE='+fmtDur2(seqTiming.teTimeSec)+'  ';
    if(seqTiming.trCount>1)info+=seqTiming.trCount+' TRs';
  }
  if(info){mmCtx.fillStyle='rgba(0,0,0,0.35)';mmCtx.font='9px monospace';mmCtx.textAlign='left';mmCtx.fillText(info,5,H-3);
    mmCtx.fillStyle=s.getPropertyValue('--fg').trim();mmCtx.globalAlpha=0.9;mmCtx.fillText(info,4,H-4);mmCtx.globalAlpha=1;}
}

function fmtDur2(s){if(s>=1)return s.toFixed(2)+'s';if(s>=0.001)return(s*1e3).toFixed(1)+'ms';return(s*1e6).toFixed(0)+'\u00b5s';}

/* ── Helpers ──────────────────────────────────────────────────────────── */
function fit(){var w=mc.width/(window.devicePixelRatio||1);sc=(w-M.l-M.r)/(TD||1e-3);ox=0;clampView();draw();drawMinimap();}
function nice(r){var ms=[1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000];
  for(var i=0;i<ms.length;i++){var b=Math.pow(10,Math.floor(Math.log10(r)));if(ms[i]*b>=r)return ms[i]*b}return 1000*Math.pow(10,Math.floor(Math.log10(r)))}
function fmtT(v){if(v>=1)return v.toFixed(3);if(v>=0.001)return v.toFixed(3);return v.toExponential(2)}
function fmtAmp(v){if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'k';if(v>=1)return v.toFixed(1);return v.toFixed(2)}
function sampleGradAtTime(g,t){
  if(!g||g.ty==='none'||!g.t||!g.w||g.t.length<2||g.w.length<2||!isFinite(t))return 0;
  var n=Math.min(g.t.length,g.w.length);
  if(t<g.t[0]||t>g.t[n-1])return 0;
  var lo=0,hi=n-1;
  while(hi-lo>1){var m=(lo+hi)>>1;if(g.t[m]<=t)lo=m;else hi=m;}
  var dt=g.t[hi]-g.t[lo];
  if(dt<=0)return g.w[lo]||0;
  return g.w[lo]+(g.w[hi]-g.w[lo])*(t-g.t[lo])/dt;
}
function fmtG(g,t){var a=gradConv(sampleGradAtTime(g,t));return a.toFixed(1)+' '+gradUnitStr()+' ('+g.ty+')';}

/* ── Downsample helper ────────────────────────────────────────────────── */
function downsample(arr,maxPts){
  if(!arr)return[];var n=arr.length;if(n<=maxPts)return Array.from(arr);
  var step=n/maxPts,out=new Array(maxPts);
  for(var i=0;i<maxPts;i++)out[i]=arr[Math.floor(i*step)];return out;
}

/* ═══════════════════════════════════════════════════════════════════════
   Serialisation — mirrors seqEditorProvider.ts serializeBlocks
   ═══════════════════════════════════════════════════════════════════════ */
var MAX_PTS=500;
function serializeBlocks(blocks){
  return blocks.map(function(b){
    var o={i:b.index,s:b.startTime,d:b.duration};
    if(b.rf){
      var rawP=downsample(b.rf.phase,MAX_PTS);
      o.rf={
        s:b.rf.startTime,d:b.rf.duration,
        t:downsample(b.rf.timePoints,MAX_PTS),
        m:downsample(b.rf.magnitude,MAX_PTS),
        p:rawP?rawP.map(function(v){return((v%(2*Math.PI))+2*Math.PI)%(2*Math.PI)}):null,
        a:b.rf.amplitude,fo:b.rf.freqOffset,po:b.rf.phaseOffset,
        u:b.rf.use||'u'
      };
    }
    if(b.gx)o.gx=serializeGrad(b.gx);
    if(b.gy)o.gy=serializeGrad(b.gy);
    if(b.gz)o.gz=serializeGrad(b.gz);
    if(b.adc)o.adc={s:b.adc.startTime,n:b.adc.numSamples,dw:b.adc.dwell,d:b.adc.delay,fo:b.adc.freqOffset,po:b.adc.phaseOffset};
    if(b.triggers&&b.triggers.length)o.trg=b.triggers.map(function(t){return{s:t.startTime,c:t.channel,d:t.delay,dr:t.duration}});
    return o;
  });
}
function serializeGrad(g){
  return {s:g.startTime,d:g.duration,t:downsample(g.timePoints,MAX_PTS),w:downsample(g.waveform,MAX_PTS),a:g.amplitude,ty:g.type,ch:g.channel};
}

/* ═══════════════════════════════════════════════════════════════════════
   File loading (standalone — calls Pulseq bundle directly)
   ═══════════════════════════════════════════════════════════════════════ */
function loadSequenceText(text,fileName){
  currentSequenceText='';
  currentSequenceName='';
  setExportButtonEnabled(false);
  try{
    showProgress('start',0,'Parsing sequence...');
    var seq=Pulseq.parseSequenceText(text);

    showProgress('timing',10,'Detecting TR/TE...');
    var timing=Pulseq.detectSequenceTiming(seq);
    seqTiming=timing;

    showProgress('decode',15,'Decoding blocks...');
    var blocks=Pulseq.decodeAllBlocks(seq);
    TD=blocks.length>0?blocks[blocks.length-1].startTime+blocks[blocks.length-1].duration:0;
    GR=seq.rasterTimes.gradientRaster;RR=seq.rasterTimes.rfRaster;AR=seq.rasterTimes.adcRaster;BR=seq.rasterTimes.blockDurationRaster;
    BL=serializeBlocks(blocks);

    // Build block positions for minimap
    var cum=0;blockPos=[];
    for(var i=0;i<seq.blocks.length;i++){
      blockPos.push({i:seq.blocks[i].num,s:cum,d:seq.blocks[i].dur*seq.rasterTimes.blockDurationRaster});
      cum+=seq.blocks[i].dur*seq.rasterTimes.blockDurationRaster;
    }

    showProgress('kspace',55,'Computing k-space...');
    kTraj=null;kAdc=null;kTime=null;kAdcTime=null;
    var ks=Pulseq.calculateKspace(blocks,GR,TD,0,{rfRaster:RR});
    if(ks){
      kTraj=[ks.ktraj[0],ks.ktraj[1],ks.ktraj[2]];
      kTime=ks.t_ktraj;
      kAdc=[ks.ktraj_adc[0],ks.ktraj_adc[1],ks.ktraj_adc[2]];
      kAdcTime=ks.t_adc;
      uploadKSpaceGPU();
    }else{kTraj=null;kAdc=null;kTime=null;kAdcTime=null;}

    showProgress('done',100,'Ready');
    computeGlobalMax();
    mmCache=null;
    if(seqTiming&&seqTiming.trTimeSec>0){fitToFirstTR();}else{fit();}
    draw();drawKs();drawMinimap();
    var name=seq.definitionsRaw.get('Name')||fileName||'SeqEyes';
    currentSequenceText=text;
    currentSequenceName=fileName||name||'sequence.seq';
    setExportButtonEnabled(true);
    document.title='SeqEyes: '+name.replace(/\.seq$/i,'');
    if(splash)splash.style.display='none';
  }catch(err){
    alert('Error loading sequence: '+(err.message||String(err)));
  }
}

// Expose globally so MATLAB can call it via executeJS()
window._seqeyesLoadFile = function(text, fileName) {
  loadSequenceText(text, fileName);
};

function showProgress(phase,percent,text){
  var o=document.getElementById('poverlay'),f=document.getElementById('pfill2'),
      t=document.getElementById('ptext'),p=document.getElementById('ppct');
  if(phase==='start'){o.style.display='flex';f.style.width='0%';t.textContent=text||'';p.textContent='0%';}
  else if(phase==='done'){f.style.width='100%';p.textContent='100%';t.textContent=text||'Ready';
    setTimeout(function(){o.style.display='none';},500);}
  else{f.style.width=(percent||0)+'%';p.textContent=(percent||0)+'%';t.textContent=text||'';}
}

function waitForPaint(){
  return new Promise(function(resolve){requestAnimationFrame(function(){setTimeout(resolve,0);});});
}

async function sha256Hex(text){
  if(!window.crypto||!window.crypto.subtle||typeof TextEncoder==='undefined')return 'unknown';
  try{
    var bytes=new TextEncoder().encode(text);
    var hash=await window.crypto.subtle.digest('SHA-256',bytes);
    var arr=Array.from(new Uint8Array(hash));
    return arr.map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }catch(_err){
    return 'unknown';
  }
}

function sanitizeFileStem(name){
  var cleaned=(name||'sequence').replace(/\.seq$/i,'').replace(/[^A-Za-z0-9._-]+/g,'_').replace(/^_+|_+$/g,'');
  return cleaned||'sequence';
}

function downloadTextFile(fileName,text,mimeType){
  var blob=new Blob([text],{type:mimeType||'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

async function exportCurrentKspace(){
  if(!currentSequenceText){alert('Open a .seq file before exporting k-space.');return;}
  if(exportBusy)return;
  exportBusy=true;
  setExportButtonEnabled(true);
  try{
    showProgress('export',10,'Exporting ADC k-space trajectory...');
    await waitForPaint();
    var sha=await sha256Hex(currentSequenceText);
    var artifacts=Pulseq.exportKspaceArtifacts(currentSequenceText,currentSequenceName||'sequence.seq',{
      packageVersion:Pulseq.PACKAGE_VERSION||'web',
      sequenceSha256:sha
    });
    var stem=sanitizeFileStem(currentSequenceName);
    downloadTextFile(stem+'_ktraj_adc.txt',artifacts.ktrajAdcText,'text/plain;charset=utf-8');
    downloadTextFile(stem+'_metadata.json',JSON.stringify(artifacts.metadata,null,2)+'\n','application/json;charset=utf-8');
    showProgress('done',100,'Exported k-space');
  }catch(err){
    alert('Error exporting k-space: '+(err.message||String(err)));
    showProgress('done',100,'Ready');
  }finally{
    exportBusy=false;
    setExportButtonEnabled(!!currentSequenceText);
  }
}

function handleFile(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){loadSequenceText(reader.result,file.name);};
  reader.readAsText(file);
}

document.getElementById('openBtn').onclick=function(){document.getElementById('fileInput').click();};

/* ═══════════════════════════════════════════════════════════════════════
   DRAWING  (identical to js_drawing.ts)
   ═══════════════════════════════════════════════════════════════════════ */
function draw(){
  var w=mc.width/(window.devicePixelRatio||1),h=mc.height/(window.devicePixelRatio||1);
  var s=getComputedStyle(document.body);
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=s.getPropertyValue('--bg').trim();ctx.fillRect(0,0,w,h);
  var vs=ox,ve=ox+(w-M.l-M.r)/sc;
  drawGrid(w,h,vs,ve,s);
  drawZeroLines(w,h,s);
  if(showBB)drawBlockBounds(w,h,s);
  drawBlocks(vs,ve,s);
  drawAxes(w,h,vs,ve,s);
  drawCursor(w,h,s);
  drawKs();
}

function drawCursor(w,h,s){
  if(!cursorActive)return;var cx=t2x(cursorT);
  if(cx<M.l||cx>w-M.r)return;
  ctx.strokeStyle=s.getPropertyValue('--cr').trim();ctx.lineWidth=0.8;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(cx,M.t);ctx.lineTo(cx,h-M.b);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=s.getPropertyValue('--cr').trim();ctx.font='10px monospace';ctx.textAlign='center';
  var label=fmtT(timeConv(cursorT)),tw=ctx.measureText(label).width;
  ctx.fillText(label,Math.max(M.l+tw/2+4,Math.min(cx,w-M.r-tw/2-4)),M.t-1);
}

function drawZeroLines(w,h,s){
  ctx.strokeStyle=s.getPropertyValue('--gr').trim();ctx.lineWidth=0.4;ctx.setLineDash([2,4]);
  var vc=visChannels();for(var vi=0;vi<vc.length;vi++){var i=vc[vi];if(i>=2&&i<=4){ctx.beginPath();ctx.moveTo(M.l,cy(vi));ctx.lineTo(w-M.r,cy(vi));ctx.stroke();}}
  ctx.setLineDash([]);
}
function drawBlockBounds(w,h,s){
  ctx.strokeStyle=s.getPropertyValue('--ax').trim();ctx.lineWidth=0.6;ctx.setLineDash([3,6]);
  for(var i=0;i<BL.length;i++){
    var x=t2x(BL[i].s);if(x<M.l||x>w-M.r)continue;
    ctx.beginPath();ctx.moveTo(x,M.t);ctx.lineTo(x,h-M.b);ctx.stroke();
    ctx.fillStyle=s.getPropertyValue('--ax').trim();ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText('#'+BL[i].i,x,M.t-2);
  }
  ctx.setLineDash([]);
}
function drawGrid(w,h,vs,ve,s){
  ctx.strokeStyle=s.getPropertyValue('--gr').trim();ctx.lineWidth=0.5;
  var st=nice((ve-vs)/8),t=Math.floor(vs/st)*st;
  while(t<=ve){var x=t2x(t);ctx.beginPath();ctx.moveTo(x,M.t);ctx.lineTo(x,h-M.b);ctx.stroke();t+=st;}
  var ch=cH(),vc=visChannels();
  for(var i=0;i<=vc.length;i++){ctx.beginPath();ctx.moveTo(M.l,M.t+i*ch);ctx.lineTo(w-M.r,M.t+i*ch);ctx.stroke();}
}

function channelRange(ci){
  var z=ampZoom[ci]||1;
  if(ci===0)return Math.max((gMax[0]||1)*z,1e-9);
  if(ci===1)return Math.max(6.28318*z,1e-9);
  if(ci>=2&&ci<=4)return Math.max((gMax[ci]||1)*z,0.001);
  return 1;
}
function fmtPhase(v){if(Math.abs(v-6.28318)<1e-3)return'2\u03c0';if(Math.abs(v-3.14159)<1e-3)return'\u03c0';if(v>=1)return v.toFixed(2);if(v>=0.01)return v.toFixed(3);return v.toExponential(1);}
function rowClip(vi,ch,fn){
  var w=mc.width/(window.devicePixelRatio||1),top=M.t+vi*ch,bottom=M.t+(vi+1)*ch,rw=Math.max(0,w-M.l-M.r);
  if(rw<=0||bottom<=top)return;
  ctx.save();ctx.beginPath();ctx.rect(M.l,top,rw,bottom-top);ctx.clip();fn();ctx.restore();
}

function drawAxes(w,h,vs,ve,s){
  ctx.fillStyle=s.getPropertyValue('--lb').trim();ctx.font='10px monospace';ctx.textAlign='center';
  ctx.strokeStyle=s.getPropertyValue('--ax').trim();ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(M.l,h-M.b);ctx.lineTo(w-M.r,h-M.b);ctx.stroke();
  var st=nice((ve-vs)/8),t=Math.floor(vs/st)*st;
  while(t<=ve){ctx.fillText(fmtT(timeConv(t)),t2x(t),h-M.b+14);t+=st;}
  ctx.fillText('time ('+timeUnitStr()+')',w-M.r+24,h-M.b+4);
  var vc=visChannels(),ch=cH();
  for(var vi=0;vi<vc.length;vi++){
    var ci=vc[vi],y0=cy(vi);
    ctx.textAlign='right';ctx.font='bold 18px monospace';
    ctx.fillStyle=chColors[ci];ctx.fillText(CH[ci],M.l-40,y0+4);
    ctx.fillStyle=s.getPropertyValue('--lb').trim();ctx.font='10px monospace';
    var lblX=M.l-12;
    if(ci===0){ctx.fillText(fmtAmp(channelRange(0))+'Hz',lblX,M.t+vi*ch+12);ctx.fillText('0',lblX,y0+ch/2-2);}
    else if(ci===1){var ph=channelRange(1);ctx.fillText(fmtPhase(ph),lblX,M.t+vi*ch+12);ctx.fillText(fmtPhase(ph/2),lblX,y0+4);ctx.fillText('0',lblX,y0+ch/2-2);}
    else if(ci>=2&&ci<=4){var d=gradConv(channelRange(ci));ctx.fillText('\u00b1'+fmtAmp(d)+gradUnitStr(),lblX,M.t+vi*ch+12);ctx.fillText('0',lblX,y0+4);}
    else if(ci===5){ctx.fillText('on',lblX,M.t+vi*ch+12);}
    else if(ci===6){ctx.fillText('ch',lblX,M.t+vi*ch+12);}
    ctx.strokeStyle=s.getPropertyValue('--ax').trim();ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(M.l-2,M.t+vi*ch);ctx.lineTo(M.l+2,M.t+vi*ch);ctx.stroke();
    ctx.beginPath();ctx.moveTo(M.l-2,y0);ctx.lineTo(M.l+2,y0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(M.l-2,M.t+(vi+1)*ch);ctx.lineTo(M.l+2,M.t+(vi+1)*ch);ctx.stroke();
  }
}

function drawBlocks(vs,ve,s){
  var ch=cH(),vc=visChannels();
  for(var bi=0;bi<BL.length;bi++){
    var b=BL[bi];if(b.s+b.d<vs||b.s>ve)continue;
    var viRF=-1,viPh=-1,viGx=-1,viGy=-1,viGz=-1,viADC=-1,viTrig=-1;
    for(var vi=0;vi<vc.length;vi++){
      if(vc[vi]===0)viRF=vi;if(vc[vi]===1)viPh=vi;
      if(vc[vi]===2)viGx=vi;if(vc[vi]===3)viGy=vi;if(vc[vi]===4)viGz=vi;
      if(vc[vi]===5)viADC=vi;if(vc[vi]===6)viTrig=vi;
    }
    // RF magnitude
    if(b.rf&&viRF>=0){
      var y=cy(viRF),rc=s.getPropertyValue('--rf').trim(),rff=s.getPropertyValue('--rff').trim();
      var rfx0=t2x(b.rf.s),rfx1=t2x(b.rf.s+b.rf.d);
      rowClip(viRF,ch,function(){
        ctx.fillStyle=rff;ctx.fillRect(rfx0,y-ch*.45,rfx1-rfx0,ch*.9);
        if(b.rf.t&&b.rf.t.length>1){
          ctx.strokeStyle=rc;ctx.lineWidth=1.1;ctx.beginPath();
          for(var i=0,f=1,sc2=ch*.9/channelRange(0);i<b.rf.t.length;i++){
            var sx=t2x(b.rf.t[i]),sy=y+ch*.45-b.rf.m[i]*sc2;
            if(f){ctx.moveTo(sx,sy);f=0}else ctx.lineTo(sx,sy);
          }ctx.stroke();
        }
      });
    }
    // RF phase
    if(b.rf&&b.rf.p&&viPh>=0){
      var py=cy(viPh);
      rowClip(viPh,ch,function(){
        ctx.strokeStyle=s.getPropertyValue('--rf').trim();ctx.lineWidth=0.8;ctx.beginPath();
        for(var i=0,f=1,psc=ch*.9/channelRange(1);i<b.rf.t.length;i++){
          var sx=t2x(b.rf.t[i]),sy=py+ch*.45-b.rf.p[i]*psc;
          if(f){ctx.moveTo(sx,sy);f=0}else ctx.lineTo(sx,sy);
        }ctx.stroke();ctx.setLineDash([]);
      });
    }
    // ADC phase curve
    if(b.adc&&viPh>=0&&b.adc.n>1){
      var apy3=cy(viPh);

}

}
function fmtKShort(v){var u=kUnitVal(v);if(!isFinite(u))return"--";if(Math.abs(u)>=1000)return(u/1000).toFixed(1)+"k";if(Math.abs(u)>=10)return u.toFixed(1);if(Math.abs(u)>=0.01)return u.toFixed(2);return u.toExponential(1);}
function formatKCursorReadout(){var s=getKCursorSample();if(!s)return"";return"kxyz="+fmtKShort(s.x)+","+fmtKShort(s.y)+","+fmtKShort(s.z)+" "+kUnitStr();}
function drawKCursorMarker(ctx,proj,cs,W,H){
  var s=getKCursorSample();if(!s||!isFinite(s.x)||!isFinite(s.y)||!isFinite(s.z))return;
  var p=proj(s.x,s.y,s.z);if(p.x<-12||p.x>W+12||p.y<-12||p.y>H+12)return;
  ctx.save();ctx.lineWidth=2;ctx.strokeStyle=cs.getPropertyValue("--cr").trim()||"#ee0000";ctx.fillStyle="rgba(255,215,0,0.90)";
  ctx.beginPath();ctx.arc(p.x,p.y,Math.max(5,kDotSize+4),0,6.283);ctx.fill();ctx.stroke();
  ctx.fillStyle=cs.getPropertyValue("--fg").trim();ctx.font="10px monospace";ctx.textAlign="left";ctx.fillText(s.source==="adc"?"ADC":"ktraj",p.x+8,p.y-8);ctx.restore();
}

/* ── K-space mouse ────────────────────────────────────────────────────── */
kCanvas.addEventListener("mousedown",function(e){kDragging=true;kDragPrev={x:e.clientX,y:e.clientY};kDragBtn=e.button;if(_kAnimId){cancelAnimationFrame(_kAnimId);_kAnimId=null}e.preventDefault();});
kCanvas.addEventListener("contextmenu",function(e){e.preventDefault();});
kCanvas.addEventListener("wheel",function(e){e.preventDefault();
  var r=kCanvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  var mx=(e.clientX-r.left)/dpr,my=(e.clientY-r.top)/dpr;
  var zf=e.deltaY<0?1.25:0.8,W=kCanvas.width/dpr,H=kCanvas.height/dpr;
  var dz=(1-1/zf)*dpr/kScl;kAutoFit=false;
  setKSpaceTarget(kRotX,kRotY,kScl*zf,kCx+(mx-W/2)*dz,kCy-(my-H/2)*dz,kCz,false);
},{passive:false});
window.addEventListener("mousemove",function(e){
  if(!kDragging||!kDragPrev||!kOpen)return;
  var dx=e.clientX-kDragPrev.x,dy=e.clientY-kDragPrev.y;kDragPrev={x:e.clientX,y:e.clientY};
  if(kView!=="3d"){kView="3d";document.getElementById("kax").textContent="3D";}
  if(kDragBtn===0){kRotY+=dx*0.008;kRotX-=dy*0.008;_tRotY=kRotY;_tRotX=kRotX}
  else{var cz=Math.cos(kRotY),sz=Math.sin(kRotY),cx=Math.cos(kRotX),sx=Math.sin(kRotX);var dpr=window.devicePixelRatio||1;dx/=(dpr*kScl);dy/=(dpr*kScl);
    if(Math.abs(cz)>0.01){kCy+=dy/cx;kCx+=(-dx-sz*sx*(dy/cx))/cz}else{kCy+=dy/cx;kCz+=(dx-cz*sx*(dy/cx))/sz}kAutoFit=false;_tCy=kCy;_tCx=kCx;_tCz=kCz}
  drawKsFast();
});
window.addEventListener("mouseup",function(){kDragging=false;kDragPrev=null;});

/* ── K-space resize handle ────────────────────────────────────────────── */
var kResizing=false,kResizeStart=0,kResizeW=500;
document.getElementById("khandle").addEventListener("mousedown",function(e){kResizing=true;kResizeStart=e.clientX;e.preventDefault();e.stopPropagation();});
window.addEventListener("mousemove",function(e){
  if(!kResizing)return;var p=document.getElementById("right");
  kResizeW=Math.max(200,Math.min(1200,kResizeW-(e.clientX-kResizeStart)));
  kResizeStart=e.clientX;p.style.width=kResizeW+"px";p.style.transition="none";
  resizeKc();drawKs();

/* ── K-space nice tick ────────────────────────────────────────────────── */
function kNice(range){var ms=[1,2,5,10,20,50,100,200,500];for(var i=0;i<ms.length;i++){var b=Math.pow(10,Math.floor(Math.log10(range)));if(ms[i]*b>=range/4)return ms[i]*b;}return 1;}

/* ── Auto-fit helper ────────────────────────────────────────────────── */
function _kAutoFitVals(){
  var rng=_kBrng||1;var W=kCanvas.width/(window.devicePixelRatio||1),H=kCanvas.height/(window.devicePixelRatio||1);
  return{
    cx:(_kBxmin+_kBxmax)/2,cy:(_kBymin+_kBymax)/2,cz:(_kBzmin+_kBzmax)/2,
    scl:Math.min(W,H)/(rng*1.15)
  };
}

/* ── K-space drawing ──────────────────────────────────────────────────── */
function drawKs_init(){
  var dpr=window.devicePixelRatio||1,targetW=500,targetH=document.getElementById("right").getBoundingClientRect().height||500;
  if(targetH<=0)targetH=500;
  var kg=document.getElementById("kg");kg.width=targetW*dpr;kg.height=targetH*dpr;kg.style.width=targetW+"px";kg.style.height=targetH+"px";
  kCanvas.width=targetW*dpr;kCanvas.height=targetH*dpr;kCanvas.style.width=targetW+"px";kCanvas.style.height=targetH+"px";
  kCtx.setTransform(dpr,0,0,dpr,0,0);drawKs_core(targetW,targetH,dpr);
}
function drawKs(){resizeKc();var dpr=window.devicePixelRatio||1,W=kCanvas.width/dpr,H=kCanvas.height/dpr;drawKs_core(W,H,dpr);}
function drawKsFast(){var dpr=window.devicePixelRatio||1,W=kCanvas.width/dpr,H=kCanvas.height/dpr;drawKs_core(W,H,dpr);}
function drawKs_core(W,H,dpr){
  if(W<=0||H<=0)return;var ctx=kCtx,cs=getComputedStyle(document.body);ctx.clearRect(0,0,W,H);
  if(!kOpen)return;
  if(!kAdc||!kAdcTime||!kAdc[0]||kAdc[0].length===0){ctx.fillStyle="#f00";ctx.font="11px monospace";ctx.fillText("NO ADC data",10,20);return;}
  var adcX=kAdc[0],adcY=kAdc[1],adcZ=kAdc[2],nAdc=adcX.length;
  if(_kBoundsDirty||!isFinite(_kBxmin)){var xmin=Infinity,xmax=-Infinity,ymin=Infinity,ymax=-Infinity,zmin=Infinity,zmax=-Infinity;for(var a=0;a<nAdc;a++){var xi=adcX[a],yi=adcY[a],zi=adcZ[a];if(isFinite(xi)){if(xi<xmin)xmin=xi;if(xi>xmax)xmax=xi;}if(isFinite(yi)){if(yi<ymin)ymin=yi;if(yi>ymax)ymax=yi;}if(isFinite(zi)){if(zi<zmin)zmin=zi;if(zi>zmax)zmax=zi;}}_kBxmin=xmin;_kBxmax=xmax;_kBymin=ymin;_kBymax=ymax;_kBzmin=zmin;_kBzmax=zmax;_kBrng=Math.max(xmax-xmin,ymax-ymin,zmax-zmin,1e-6);_kBoundsDirty=false}
  var rng3=_kBrng;if(!isFinite(_kBxmin)){ctx.fillStyle="#f00";ctx.font="11px monospace";ctx.fillText("ALL NaN",10,20);return;}
  if(kAutoFit){kAutoFit=false;var af=_kAutoFitVals();setKSpaceTarget(kRotX,kRotY,af.scl,af.cx,af.cy,af.cz,false)}
  var mw2=mc.width/(window.devicePixelRatio||1),vs=ox,ve=ox+(mw2-M.l-M.r)/sc;
  // WebGL scatter
  if(gl&&glBuf&&glN>0){
    gl.useProgram(glProgram);var hW=W*dpr*0.5,hH=H*dpr*0.5;
    gl.viewport(0,0,W*dpr,H*dpr);gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform1f(glU_cy,Math.cos(kRotY));gl.uniform1f(glU_sy,Math.sin(kRotY));
    gl.uniform1f(glU_cx,Math.cos(kRotX));gl.uniform1f(glU_sx,Math.sin(kRotX));
    gl.uniform3f(glU_center,kCx,kCy,kCz);gl.uniform1f(glU_scale,kScl);
    gl.uniform2f(glU_halfRes,hW,hH);gl.uniform1f(glU_tMin,vs);gl.uniform1f(glU_tMax,ve);
    gl.uniform1f(glU_dot,kDotSize*dpr);
    var ac=cs.getPropertyValue("--adc").trim();var rgb=parseCSSColor(ac);
    gl.uniform4f(glU_color,rgb[0],rgb[1],rgb[2],0.85);
    gl.bindBuffer(gl.ARRAY_BUFFER,glBuf);
    gl.enableVertexAttribArray(glAttribPos);gl.vertexAttribPointer(glAttribPos,3,gl.FLOAT,false,16,0);
    gl.enableVertexAttribArray(glAttribTime);gl.vertexAttribPointer(glAttribTime,1,gl.FLOAT,false,16,12);
    gl.drawArrays(gl.POINTS,0,glN);
  }
  // Canvas 2D axes
  var cz=Math.cos(kRotY),sz=Math.sin(kRotY),cxR=Math.cos(kRotX),sxR=Math.sin(kRotX),invDpr=1/dpr;
  function proj(px,py,pz){var dx2=px-kCx,dy2=py-kCy,dz2=pz-kCz;var rx=dx2*cz-dz2*sz;var rz2=dx2*sz+dz2*cz;var ry=dy2*cxR-rz2*sxR;return{x:W/2+rx*kScl*invDpr,y:H/2-ry*kScl*invDpr};}
  var tick=kNice(rng3);
  function drawAxis3D(fx,fy,fz,label,col){
    var al=rng3*0.65,t1=proj(fx*al,fy*al,fz*al),t2=proj(-fx*al,-fy*al,-fz*al);
    ctx.strokeStyle=col;ctx.lineWidth=1.6;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(t2.x,t2.y);ctx.lineTo(t1.x,t1.y);ctx.stroke();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(t1.x,t1.y,4,0,6.283);ctx.fill();
    ctx.fillStyle=col;ctx.font="bold 11px monospace";ctx.fillText(label,t1.x+5,t1.y-5);
    ctx.fillStyle=cs.getPropertyValue("--lb").trim();ctx.font="8px monospace";
    for(var v=tick;v<=al;v+=tick){
      var tp=proj(fx*v,fy*v,fz*v),tm=proj(-fx*v,-fy*v,-fz*v);
      ctx.strokeStyle=col;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(tp.x-3,tp.y);ctx.lineTo(tp.x+3,tp.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tm.x-3,tm.y);ctx.lineTo(tm.x+3,tm.y);ctx.stroke();ctx.fillText(kTickVal(v),tp.x+5,tp.y-2);
    }
  }
  drawAxis3D(1,0,0,"kx",cs.getPropertyValue("--gx").trim());
  drawAxis3D(0,1,0,"ky",cs.getPropertyValue("--gy").trim());
  drawAxis3D(0,0,1,"kz",cs.getPropertyValue("--gz").trim());
  var oo=proj(0,0,0);ctx.fillStyle=cs.getPropertyValue("--fg").trim();ctx.beginPath();ctx.arc(oo.x,oo.y,4,0,6.283);ctx.fill();
  drawKCursorMarker(ctx,proj,cs,W,H);
}

function parseCSSColor(c){
  if(!c)return[0.26,0.83,0.96];var m=c.match(/^#([0-9a-fA-F]{2})([0-9a-fA-F]{2})([0-9a-fA-F]{2})$/);
  if(m)return[parseInt(m[1],16)/255,parseInt(m[2],16)/255,parseInt(m[3],16)/255];
  m=c.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);if(m)return[+m[1]/255,+m[2]/255,+m[3]/255];
  return[0.26,0.83,0.96];
}

if(location.search.indexOf("debug=1")>=0){

    state:function(){
      var adcCount=(kAdc&&kAdc[0])?kAdc[0].length:0;
      return{blocks:BL.length,totalDuration:TD,offset:ox,scale:sc,visibleDuration:visibleDuration(),minRasterTime:minRasterTime(),kOpen:kOpen,kView:kView,kRotX:kRotX,kRotY:kRotY,kScale:kScl,adcCount:adcCount,exportEnabled:!!(exportBtn&&!exportBtn.disabled),title:document.title};
    },
    hoverPoint:function(){

      var x=t2x(t),y=M.t+cH()*3.5;
      return{x:x,y:y,time:t};
    }
  };
}
